kind = "web"
previewPath = "/"
title = "Safad Vibe"
version = "1.0.0"
id = "artifacts/safad-vibe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25218

[services.development]
run = "pnpm --filter @workspace/safad-vibe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safad-vibe", "run", "build" ]
publicDir = "artifacts/safad-vibe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25218"
BASE_PATH = "/"
